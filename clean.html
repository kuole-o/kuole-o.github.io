<!DOCTYPE html><html lang="zh-CN" data-theme="light"><head><meta charset="UTF-8"><meta name="referrer" content="origin-when-cross-origin"><meta name="color-scheme" content="light dark"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>清理缓存 | Guo Le's Blog</title><meta name="keywords" content="郭乐,Guo Le"><meta name="author" content="夜的第八章"><meta name="copyright" content="夜的第八章"><meta name="format-detection" content="telephone=no"><meta name="theme-color" content="#f7f9fe"><meta name="description" content="折腾，发呆，躺平，无缝切换的 95 后青年。"><link rel="shortcut icon" href="/favicon.ico"><style>.main{display:inline-block;height:100%}#button_all{margin:3rem 0 1rem 0;display:flex;text-align:left}#output{margin-left:5px}a.button{color:#256fff;cursor:pointer;margin:0 5px;text-decoration:unset;transition:.3s}a.button:hover{font-weight:600;transition:.3s;text-decoration:underline}</style></head><body><div class="main"><div id="output"><div id="time"></div><div id="swCache"></div><div id="localCache"></div><p id="tip">等待指令…</p></div><div id="button_all"><a class="button" onclick='refreshCache(1,"主动点击按钮（常规清理）：")'>常规清理</a> <a class="button" onclick='refreshCache(0,"主动点击按钮（全部清理）：")'>全部清理</a> <a class="button" href="/">回到首页</a></div></div><script defer>function time(){return(new Date).toLocaleString().split("/").join("-")}function outputMessage(e,o){const t=document.createElement("p");t.innerHTML=time()+" "+e+o,document.getElementById("tip").style.display="none",document.getElementById("output").appendChild(t)}async function getCacheNames(){return await caches.keys()}async function getData(){const e=document.getElementById("swCache"),o=document.getElementById("localCache");try{const o=await getCacheNames();o.length>0?(e.innerHTML+="<p>本地存在的 Service Worker 缓存为：</p>",o.forEach((o=>{e.innerHTML+=`<li>${o}</li>`}))):e.innerHTML+="<p>本地存在的 Service Worker 缓存为：0</p>"}catch(o){console.error("获取缓存名称时出错：",o),e.innerHTML+="<p>获取缓存名称时出错。</p>"}if(localStorage.length>0){o.innerHTML+="<p>本地存在的 localStorage 缓存为：</p>";for(let e=0;e<localStorage.length;e++){const t=localStorage.key(e);o.innerHTML+=`<li>${t}</li>`}}else o.innerHTML+="<p>本地存在的 localStorage 缓存为：0</p>"}async function refreshCache(e,o){let t,n=[];const a=async e=>{try{await caches.delete(e),n.push(e),t=`已清理缓存：${e}`,console.log(t),outputMessage(o,t)}catch(o){console.error(`清理缓存 ${e} 时出错：`,o)}};try{const c=(await getCacheNames()).map((o=>1===e&&"Blog"===o||0===e?a(o):void 0)).filter(Boolean);await Promise.all(c),localStorage.length>0&&(Object.keys(localStorage).forEach((e=>{localStorage.removeItem(e)})),0==localStorage.length&&(t="localStorage 已全部清除。",console.log(t),outputMessage(o,t))),n.length>0?(t=`本地 Service Worker 缓存已全部清除：${n.join(", ")}`,console.log(t),outputMessage(o,t)):(console.log("没有发现可清理的缓存。"),outputMessage(o,"没有发现可清理的缓存。"))}catch(e){console.error("清理缓存时出错：",e)}}getData(),window.location.search.length>0&&window.location.search.includes("type=1")&&refreshCache(1,"参数调用（常规清理）："),window.location.search.length>0&&window.location.search.includes("type=0")&&refreshCache(0,"参数调用（常规清理）："),document.addEventListener("pjax:complete",(()=>{getData(),window.location.search.length>0&&window.location.search.includes("type=1")&&refreshCache(1,"参数调用（常规清理）："),window.location.search.length>0&&window.location.search.includes("type=0")&&refreshCache(0,"参数调用（常规清理）："),console.log("触发 pjax:complete 事件。")}))</script></body></html>
